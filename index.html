<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App 테스트 빌드 배포</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 40px 20px;
    }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 24px;
      max-width: 480px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 16px; margin-bottom: 12px; }
    .info { font-size: 13px; color: #555; margin-bottom: 16px; line-height: 1.6; }
    .info span { display: block; }
    a.btn {
      display: inline-block;
      padding: 10px 20px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }
    a.btn:hover { background: #333; }
    .note {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>App 테스트 빌드 배포</h1>
  <p class="subtitle">내부 테스트용 빌드입니다. 인가된 기기에서만 설치 가능합니다.</p>

  <!-- iOS -->
  <div class="card">
    <h2>iOS (Adhoc)</h2>
    <div class="info">
      <span>버전: <strong>2.14.10</strong></span>
      <span>빌드: <strong>669</strong></span>
      <span>업데이트: <strong>2026-04-22</strong></span>
    </div>
    <a class="btn" href="itms-services://?action=download-manifest&url=https://ratm01.github.io/adhoc/ios/manifest.plist">
      iOS 설치
    </a>
    <p class="note">Safari에서 열어주세요. UDID가 프로비저닝 프로파일에 등록된 기기만 설치 가능합니다.</p>
  </div>

  <!-- Android -->
  <div class="card">
    <h2>Android (APK)</h2>
    <div class="info">
      <span>버전: <strong>2.14.8</strong></span>
      <span>빌드: <strong>1</strong></span>
      <span>업데이트: <strong>2026-04-01</strong></span>
    </div>
    <a class="btn" href="android/mommytalk-2.14.8.apk">
      APK 다운로드
    </a>
    <p class="note">설정 &gt; 보안에서 "출처를 알 수 없는 앱 설치"를 허용한 후 설치하세요.</p>
  </div>
</body>
</html>
